<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Paisabada | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --teal: #00b4b0;
      --navy: #002b5b;
      --bg1: #e3fffb;
      --bg2: #f5fffe;
      --radius: 18px;
    }

    body {
      font-family: Poppins, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 16px;
    }

    .card {
      width: 95%;
      max-width: 420px;
      background: #fff;
      padding: 40px 28px;
      border-radius: var(--radius);
      box-shadow: 0 12px 32px rgba(0, 0, 0, .14);
      text-align: center;
    }

    h2 {
      color: var(--navy);
      margin-bottom: 6px;
      font-weight: 800;
    }

    .input-box {
      position: relative;
      margin: 18px 0;
    }

    .input-box input {
      width: 80%;
      padding: 14px 46px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
    }

    button {
      width: 100%;
      background: var(--teal);
      border: none;
      color: #fff;
      padding: 15px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
    }

    .error,
    .success {
      display: none;
      font-size: 14px;
      font-weight: 700;
      margin-top: 12px;
    }

    .error {
      color: #d9534f
    }

    .success {
      color: #1da756
    }

    .signup-link {
      margin-top: 16px;
      display: inline-block;
      font-size: 15px;
      font-weight: 700;
      color: var(--teal);
      text-decoration: none;
    }


    /* =========================
   RESPONSIVE FIXES ONLY
   ========================= */

    @media (max-width: 768px) {
      .card {
        padding: 32px 22px;
      }

      h2 {
        font-size: 24px;
      }

      .input-box input {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 18px;
      }

      h2 {
        font-size: 22px;
      }

      .input-box input {
        width: 100%;
      }

      button {
        font-size: 16px;
      }
    }

    @media (max-width: 360px) {
      h2 {
        font-size: 20px;
      }

      .signup-link {
        font-size: 14px;
      }
    }

    /* =========================
   SAFE RESPONSIVE PATCH
   ========================= */
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
    }

    /* Fix input width issue */
    .input-box input {
      width: 100%;
      max-width: 100%;
    }

    /* Better touch on mobile */
    button {
      min-height: 48px;
    }

    /* Small phones (320px – 360px) */
    @media (max-width:360px) {

      body {
        padding: 10px;
      }

      .card {
        padding: 22px 14px;
      }

      h2 {
        font-size: 19px;
      }

      p {
        font-size: 12px;
      }

      .input-box {
        margin: 14px 0;
      }

      .input-box input {
        font-size: 13px;
        padding: 12px 40px;
      }

      button {
        font-size: 14px;
        padding: 12px;
      }

      .signup-link {
        font-size: 13px;
      }
    }

    /* Landscape mobile fix */
    @media (max-height:500px) {
      body {
        align-items: flex-start;
        padding-top: 20px;
      }
    }

    /* Large screens */
    @media (min-width:1024px) {
      .card {
        max-width: 460px;
      }
    }



    .forgot-link {
      display: block;
      margin-top: 12px;
      font-size: 14px;
      color: #00b4b0;
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

      let loginOtpSent = false;
      let timer = 30;
      let timerInterval;

      function isMobile(val) {
        return /^[6-9]\d{9}$/.test(val);
      }

      function login() {

        const mobile = document.getElementById("identifier").value.trim();
        const otp = document.getElementById("loginOtp").value.trim();

        const error = document.getElementById("error");
        const success = document.getElementById("success");

        error.style.display = "none";
        success.style.display = "none";

        if (!isMobile(mobile)) {
          error.textContent = "Enter valid mobile number";
          error.style.display = "block";
          return;
        }

        // STEP 1: Send OTP
        if (!loginOtpSent) {

          fetch("http://localhost:8080/api/auth/send-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mobile })
          })
            .then(res => {
              if (!res.ok) throw new Error();

              document.getElementById("loginOtpBox").style.display = "block";
              document.getElementById("loginBtn").innerText = "Verify OTP";

              loginOtpSent = true;
              startOtpTimer();
            })
            .catch(() => {
              error.textContent = "Failed to send OTP";
              error.style.display = "block";
            });

        }

        // STEP 2: Verify OTP
        else {

          if (!otp) {
            error.textContent = "Enter OTP";
            error.style.display = "block";
            return;
          }

          fetch("http://localhost:8080/api/auth/verify-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mobile, otp })
          })
            .then(res => {
              if (!res.ok) throw new Error();
              return res.json();
            })
            .then(user => {

              localStorage.setItem("pbLoggedIn", "true");
              localStorage.setItem("pbUser", JSON.stringify(user));

              return fetch(`http://localhost:8080/api/wallet/${user.id}`);
            })
            .then(res => res.json())
            .then(wallet => {

              const user = JSON.parse(localStorage.getItem("pbUser"));
              user.coins = wallet.coins;
              user.xp = wallet.xp || 0;

              localStorage.setItem("pbUser", JSON.stringify(user));

              success.style.display = "block";

              setTimeout(() => {
                window.location.href = "wallet.html";
              }, 800);

            })
            .catch(() => {
              error.textContent = "Invalid OTP";
              error.style.display = "block";
            });

        }
      }

      function resendOtp() {

        const mobile = document.getElementById("identifier").value.trim();

        fetch("http://localhost:8080/api/auth/send-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mobile })
        })
          .then(() => {
            alert("OTP Sent Again");
            startOtpTimer();
          })
          .catch(() => {
            alert("Failed to resend OTP");
          });

      }



      function startOtpTimer() {

        const timerText = document.getElementById("otpTimer");
        const resendLink = document.getElementById("resendOtpLink");

        resendLink.style.display = "none";
        timer = 30;

        clearInterval(timerInterval);

        timerInterval = setInterval(() => {

          timerText.innerText = "Resend OTP in " + timer + " sec";

          timer--;

          if (timer < 0) {

            clearInterval(timerInterval);
            timerText.innerText = "";
            resendLink.style.display = "block";

             clearInterval(timerInterval);
            timerText.innerText = "";
            resendLink.style.display = "block";

          }

        }, 1000);

      }
