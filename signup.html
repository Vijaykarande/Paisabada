<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Paisabada | Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
--teal: #00b4b0;
--navy: #002b5b;
--bg1: #e3fffb;
--bg2: #f5fffe;
--radius: 18px;
}

body {
font-family: Poppins, Arial, sans-serif;
background: linear-gradient(135deg, var(--bg1), var(--bg2));
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
margin: 0;
padding: 16px;
}

.card {
width: 95%;
max-width: 420px;

background: #fff;
padding: 40px 28px;
border-radius: var(--radius);
text-align: center;
box-shadow: 0 12px 32px rgba(0, 0, 0, .14);
animation: fadeUp .45s ease-out;
}

@keyframes fadeUp {
from {
opacity: 0;
transform: translateY(40px)
}

to {
opacity: 1;
transform: translateY(0)
}
}

h2 {
font-size: 28px;
font-weight: 800;
color: var(--navy);
margin-bottom: 5px;
}

.input-box {
position: relative;
margin: 16px 0
}

.input-box input {
width: 75%;
padding: 14px 48px;
border-radius: 14px;
border: 1px solid #cbd5e1;
font-size: 16px;
outline: none;
transition: .25s;
}

.input-box input:focus {
border-color: var(--teal);
box-shadow: 0 0 8px rgba(0, 180, 176, .3);
}

.input-box i {
position: absolute;
top: 50%;
left: 14px;
transform: translateY(-50%);
font-size: 18px;
color: var(--teal);
}

.toggle-pass {
position: absolute;
right: 12px;
top: 50%;
transform: translateY(-50%);
font-size: 18px;

cursor: pointer;
color: #6b7280;
}

button {
width: 100%;
padding: 15px;
background: var(--teal);
color: #fff;
border: none;
border-radius: 14px;
font-size: 18px;
font-weight: 700;
margin-top: 12px;
cursor: pointer;
transition: .3s;
}

button:hover {
background: #009d99;
transform: translateY(-2px);
box-shadow: 0 6px 18px rgba(0, 0, 0, .18);
}

.error,
.success {
display: none;
font-weight: 700;
margin-top: 10px;
font-size: 14px;
}

.error {
color: #d9534f
}

.success {
color: #1da756
}

@keyframes shake {

0%,
100% {
transform: translateX(0)
}

25% {
transform: translateX(-6px)
}

50% {
transform: translateX(6px)
}

75% {
transform: translateX(-6px)
}
}

/* =========================
RESPONSIVE FIXES ONLY

========================= */

/* Tablets */
@media (max-width: 768px) {
.card {
padding: 32px 22px;
}

h2 {
font-size: 24px;
}

.input-box input {
width: 100%;
font-size: 15px;
}

button {
font-size: 16px;
padding: 14px;
}
}

/* Mobile phones */
@media (max-width: 480px) {
body {
padding: 12px;
}

.card {
padding: 28px 18px;

border-radius: 16px;
}

h2 {
font-size: 22px;
}

p {
font-size: 13px;
}

.input-box {
margin: 14px 0;
}

.input-box input {
width: 100%;
padding: 13px 44px;
font-size: 14px;
}

.input-box i {
left: 12px;
font-size: 17px;
}

.toggle-pass {
right: 10px;
font-size: 17px;
}

button {
font-size: 15px;
padding: 13px;
}
}

/* Small phones (very narrow) */
@media (max-width: 360px) {
h2 {
font-size: 20px;
}

.card {
padding: 24px 14px;
}

.input-box input {
font-size: 13px;
}

button {
font-size: 14px;
}
}

/* =========================
GLOBAL SAFETY FIXES
========================= */
* {
box-sizing: border-box;
}

html,
body {
width: 100%;
overflow-x: hidden;
}

/* =========================
CARD RESPONSIVENESS
========================= */
.card {
width: 100%;
max-width: 420px;
}

/* =========================
INPUT WIDTH FIX (IMPORTANT)
========================= */
.input-box input {
width: 100%;
max-width: 100%;
}

/* =========================
ICON + INPUT ALIGNMENT
========================= */
.input-box {
display: flex;
align-items: center;
}

.input-box i {
pointer-events: none;
}

/* =========================
BUTTON TOUCH FRIENDLY
========================= */
button {
min-height: 48px;
}

/* =========================
VERY SMALL DEVICES (320px)
========================= */
@media (max-width: 360px) {

body {
padding: 10px;
}

.card {
padding: 22px 14px;
}

h2 {
font-size: 19px;
}

p {
font-size: 12px;
}

.input-box input {
padding: 12px 42px;
font-size: 13px;
}

.toggle-pass {
font-size: 16px;
}

button {
font-size: 14px;
padding: 12px;
}

.consent-text {
font-size: 13px;
}

.consent-note {
font-size: 11px;
}
}

/* =========================
LANDSCAPE MOBILE FIX
========================= */
@media (max-height: 500px) {
body {
align-items: flex-start;
padding-top: 20px;

}
}

/* =========================
TABLET LARGE SCREENS
========================= */
@media (min-width: 1024px) {
.card {
max-width: 460px;
}
}

/* =========================
CONSENT UI
========================= */

.consent-box {
margin-top: 18px;
padding: 14px;
border-radius: 12px;
background: #f7fffe;
border: 1px solid #cceeee;
text-align: left;
}

.consent-label {
display: flex;
gap: 10px;
cursor: pointer;
align-items: flex-start;

font-size: 14px;
color: #334155;
line-height: 1.4;
}

.consent-label input {
display: none;
}

/* Custom checkbox */
.checkmark {
min-width: 20px;
height: 20px;
border-radius: 6px;
border: 2px solid #00b4b0;
margin-top: 2px;
position: relative;
}

.consent-label input:checked+.checkmark {
background: #00b4b0;
}

.consent-label input:checked+.checkmark::after {
content: "✓";
position: absolute;
color: white;
font-size: 14px;
left: 4px;
top: -1px;
font-weight: 700;

}

.consent-text {
font-size: 14px;
}

.consent-note {
margin: 6px 0 0 30px;
font-size: 12px;
color: #64748b;
}
</style>
</head>

<body>

<script>
function togglePassword() {
const p = document.getElementById("signupPassword");
p.type = p.type === "password" ? "text" : "password";
}

function validateEmail(e) {
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

function validatePhone(p) {
return /^[6-9]\d{9}$/.test(p);
}

function showError(msg) {
const err = document.getElementById("errorMsg");
err.innerText = msg;
err.style.display = "block";

const card = document.getElementById("signupCard");
card.style.animation = "shake .3s";
setTimeout(() => card.style.animation = "", 300);
}

let otpSent = false;

async function signup() {

const name = signupName.value.trim();
const email = signupEmail.value.trim();
const phone = signupPhone.value.trim();
const consent = document.getElementById("userConsent").checked;
const otp = document.getElementById("signupOtp")?.value?.trim();

const err = document.getElementById("errorMsg");
const success = document.getElementById("successMsg");

err.style.display = "none";
success.style.display = "none";

if (!otpSent) {

if (!name || !email || !phone) {
showError("All fields are required");
return;

}

if (!validateEmail(email)) {
showError("Invalid email address");
return;
}

if (!validatePhone(phone)) {
showError("Invalid mobile number");
return;
}

if (!consent) {
showError("Please accept consent to continue");
return;
}

try {

const res = await fetch("http://localhost:8080/api/auth/send-otp", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ mobile: phone })
});

if (!res.ok) throw new Error();

// const sessionId = await res.text();
// localStorage.setItem("otpSessionId", sessionId);

document.getElementById("otpBox").style.display = "block";
document.getElementById("signupBtn").innerText = "Verify & Create Account";
document.getElementById("signupPhone").disabled = true;
document.getElementById("otpInfo").style.display = "block";
otpSent = true;

} catch (e) {
showError("Unable to send OTP");
}

} else {

if (!otp) {
showError("Enter OTP");
return;
}

try {

// STEP 1 — VERIFY OTP
const verifyRes = await fetch("http://localhost:8080/api/auth/verify-otp", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
mobile: phone,
otp: otp
})
});
if (!verifyRes.ok) {
showError("Invalid OTP");

return;
}

// GET REFERRAL FROM URL
const params = new URLSearchParams(window.location.search);
const referralCode = params.get("code");
const signupRes = await fetch("http://localhost:8080/api/auth/signup", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
name: name,
email: email,
mobile: phone,
referralCode: referralCode,
communicationConsent: consent
})
});

if (!signupRes.ok) {
throw new Error("Signup failed");
}

const user = await signupRes.json();

success.style.display = "block";

setTimeout(() => {
window.location.href = "login.html";
}, 800);

} catch (e) {

showError("Invalid OTP");
}
}
}
